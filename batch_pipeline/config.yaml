pipeline:
  name: olist-batch-pipeline
  version: "1.0.0"

spark:
  app_name: OlistBatchPipeline
  master: local[*]
  config:
    spark.sql.parquet.compression.codec: snappy
    spark.sql.shuffle.partitions: "200"
    spark.driver.memory: 4g
    spark.executor.memory: 4g

s3:
  raw_bucket: ${S3_RAW_BUCKET}
  processed_bucket: ${S3_PROCESSED_BUCKET}
  raw_prefix: raw
  processed_prefix: processed

tables:
  - orders
  - order_items
  - order_payments
  - order_reviews
  - customers
  - sellers
  - products
  - product_category_name_translation
  - geolocation

output:
  format: parquet
  mode: overwrite
  partition_by:
    orders: ["order_purchase_year", "order_purchase_month"]

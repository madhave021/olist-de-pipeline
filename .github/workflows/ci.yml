name: CI

on:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r batch_pipeline/lambda/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 batch_pipeline/lambda/ --max-line-length=120 --exclude=__pycache__

  deploy:
    name: Deploy CloudFormation
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Package Lambda
        run: |
          pip install -r batch_pipeline/lambda/requirements.txt -t /tmp/lambda_package/
          cp batch_pipeline/lambda/olist_ingestor.py /tmp/lambda_package/
          cd /tmp/lambda_package && zip -r $GITHUB_WORKSPACE/olist-ingestor.zip .

      - name: Upload Lambda artifact to S3
        run: |
          aws s3 cp olist-ingestor.zip s3://olist-lambda-artifacts-105906274703/lambda/olist-ingestor.zip

      - name: Cleanup failed CloudFormation stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name olist-de-pipeline \
            --region ap-south-1 \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
            echo "Stack is in $STATUS state — deleting before redeploy..."
            aws cloudformation delete-stack \
              --stack-name olist-de-pipeline \
              --region ap-south-1
            aws cloudformation wait stack-delete-complete \
              --stack-name olist-de-pipeline \
              --region ap-south-1
            echo "Stack deleted."
          else
            echo "Stack status: $STATUS — no cleanup needed."
          fi

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name olist-de-pipeline \
            --template-file infra/cloudformation/template.yml \
            --region ap-south-1 \
            --capabilities CAPABILITY_NAMED_IAM
